{% extends 'core/base.html' %}
{% block title %}{{ action }} campanie – DevBoost{% endblock %}
{% block content %}
<div class="container" style="max-width:600px; padding-top:40px; padding-bottom:80px;">
  <div style="margin-bottom:24px;">
    <a href="{% url 'campaigns' %}" class="btn btn--ghost btn--sm">← Înapoi la Campanii</a>
  </div>
  <div class="profile-main">
    <h1 style="font-size:1.5rem; margin-bottom:24px;">{{ action }} campanie</h1>
    {% if error %}<div class="alert alert--error" style="margin-bottom:20px;">⚠️ {{ error }}</div>{% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label for="platform">Platformă *</label>
        <select id="platform" name="platform">
          {% for p in platforms %}
          <option value="{{ p }}" {% if campaign.platform == p %}selected{% endif %}>
            {{ platform_icons|default_if_none:'' }} {{ p }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="text">Textul postării *</label>
        <textarea id="text" name="text" style="min-height:140px;" required placeholder="Textul campaniei tale pe social media…">{{ campaign.text|default:'' }}</textarea>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="form-group" style="margin-bottom:0;">
          <label for="likes">Likes simulate</label>
          <input type="number" id="likes" name="likes" value="{{ campaign.likes|default:'0' }}" min="0">
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label for="comments">Comentarii simulate</label>
          <input type="number" id="comments" name="comments" value="{{ campaign.comments|default:'0' }}" min="0">
        </div>
      </div>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button type="submit" class="btn btn--primary">💾 Salvează campania</button>
        <a href="{% url 'campaigns' %}" class="btn btn--ghost">Anulează</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
